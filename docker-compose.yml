  version: '3.8'
  services:
    db:
      image: postgres:latest
      container_name : meetinsport_db
      environment:
        POSTGRES_USER: admin
        POSTGRES_PASSWORD: admin123
        POSTGRES_DB: meetinsportDb
      ports:
        - "5433:5432"
      volumes:
        - postgres_data:/var/lib/postgresql/data

  volumes:
    postgres_data: